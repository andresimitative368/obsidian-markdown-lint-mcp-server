name: Bug report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report. Please do not paste secrets, tokens, or private vault content.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including which MCP tool is involved (lint_markdown, validate_front_matter, render_mermaid_diagrams, extract_mermaid_from_svg).
      placeholder: When I call render_mermaid_diagrams with ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The minimal input that triggers it. Include the markdown, schema, or SVG snippet if relevant.
      render: markdown
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: The package.json version, git commit, or image tag you ran.
    validations:
      required: true
  - type: dropdown
    id: how-run
    attributes:
      label: How are you running it?
      options:
        - Docker image via Claude Code (stdio)
        - Compiled functions directly (npm)
        - Other (describe above)
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Docker version, Node version, Claude Code version.
      placeholder: macOS 15, Docker 27, Node 22, Claude Code ...
    validations:
      required: false
