# This is a stdio MCP server, not a long-running service. Do NOT `docker compose up`.
# Compose is used here only to BUILD and TAG the image:
#
#     docker compose build
#
# Claude Code then launches the server per session over stdio:
#
#     claude mcp add obsidian-markdown-lint -- docker run -i --rm obsidian-markdown-lint-mcp
#
# To smoke-test the container by hand, you can also run the one-shot service
# (stdin stays open, no TTY — exactly how an MCP client drives it):
#
#     docker compose run --rm obsidian-markdown-lint-mcp
#
services:
  obsidian-markdown-lint-mcp:
    build: .
    image: obsidian-markdown-lint-mcp
    stdin_open: true   # equivalent to `docker run -i` — keep stdin open for JSON-RPC
    tty: false         # never allocate a TTY; the stream must stay raw JSON-RPC
